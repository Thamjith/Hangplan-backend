spring:
  application:
    name: hangplan
  datasource:
    url: jdbc:postgresql://localhost:5432/hangplan
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, profile, email
        provider:
          google:
            user-name-attribute: sub

app:
  jwt:
    secret: ${JWT_SECRET:hangplan-jwt-dev-secret-please-replace-32chars min}
  frontend-url: http://localhost:5173

server:
  port: 8080
