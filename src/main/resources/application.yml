spring:
  application:
    name: hangplan
  datasource:
    url: jdbc:postgresql://localhost:5432/hangplan
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  flyway:
    # Existing DBs were created before Flyway (e.g. Hibernate only): allow first migrate without failing.
    baseline-on-migrate: true
    # Default baseline is 1, which would skip V1__*.sql; 0 ensures subscription migration still runs.
    baseline-version: 0
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: openid, profile, email
            # Behind nginx without correct forwarded Host/proto, Spring may think this host is localhost:8080.
            # Production (Option A): https://api.hangplan.in/login/oauth2/code/google — set via OAUTH2_REDIRECT_URI on EC2.
            redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
        provider:
          google:
            user-name-attribute: sub

app:
  jwt:
    secret: ${JWT_SECRET:hangplan-jwt-dev-secret-please-replace-32chars min}
  frontend-url: ${FRONTEND_URL:https://hangplan.in}

server:
  port: 8080
  forward-headers-strategy: framework
