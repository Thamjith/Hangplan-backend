name: Build and Deploy Backend to EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build backend JAR
        run: mvn -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          if-no-files-found: error

  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-artifact

      - name: Configure SSH access
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create backend runtime env file
        run: |
          : > backend.env
          printf 'DB_USERNAME=%q\n' "${{ secrets.DB_USERNAME }}" >> backend.env
          printf 'DB_PASSWORD=%q\n' "${{ secrets.DB_PASSWORD }}" >> backend.env
          printf 'GOOGLE_CLIENT_ID=%q\n' "${{ secrets.GOOGLE_CLIENT_ID }}" >> backend.env
          printf 'GOOGLE_CLIENT_SECRET=%q\n' "${{ secrets.GOOGLE_CLIENT_SECRET }}" >> backend.env
          printf 'JWT_SECRET=%q\n' "${{ secrets.JWT_SECRET }}" >> backend.env

      - name: Copy backend artifact to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/hangplan' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_APP_DIR/backend"
          scp backend-artifact/*.jar "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/backend/app.jar"
          scp backend.env "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/backend/.env"

      - name: Restart backend process on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/hangplan' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "EC2_APP_DIR='$EC2_APP_DIR' bash -se" <<'EOF'
          set -e
          cd "$EC2_APP_DIR/backend"
          if pgrep -f 'java .*app.jar' >/dev/null; then
            pkill -f 'java .*app.jar'
            sleep 2
          fi
          set -a
          . ./.env
          set +a
          nohup java -jar app.jar > app.log 2>&1 &
          EOF
