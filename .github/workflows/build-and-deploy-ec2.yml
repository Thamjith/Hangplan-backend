name: Build and Deploy Backend to EC2

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build backend JAR
        run: mvn -B clean package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: target/*.jar
          if-no-files-found: error

  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend-artifact

      - name: Configure SSH access
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Create backend runtime env file
        run: |
          cat <<EOF > backend.env
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Copy backend artifact to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/hangplan' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "mkdir -p $EC2_APP_DIR/backend"
          scp backend-artifact/*.jar "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/backend/app.jar"
          scp backend.env "$EC2_USER@$EC2_HOST:$EC2_APP_DIR/backend/.env"

      - name: Restart backend process on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR || '/opt/hangplan' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" "
            set -e
            cd $EC2_APP_DIR/backend
            if pgrep -f 'java .*app.jar' >/dev/null; then
              pkill -f 'java .*app.jar'
              sleep 2
            fi
            set -a
            . ./.env
            set +a
            nohup java -jar app.jar > app.log 2>&1 &
          "
